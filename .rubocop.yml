inherit_mode:
  merge:
    - Exclude

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  Exclude:
    - 'bin/**/*'
    - 'sig/**/*'
    - 'pkg/**/*'
    - 'vendor/**/*'

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: single_quotes

Style/Documentation:
  Enabled: false

Style/StructInheritance:
  Enabled: false # `class X < Struct.new(...)` is required so Steep can resolve `self` inside the class body

Metrics/MethodLength:
  Max: 20

Metrics/ClassLength:
  Max: 130 # CLI grows ~15 lines per subcommand (parser option, dispatch, handler, line formatter)

Metrics/BlockLength:
  Exclude:
    - '*.gemspec'
    - 'spec/**/*.rb'
